services:
  - type: web
    name: rotc-e-ams
    runtime: node
    plan: free
    buildCommand: cd frontend && npm ci --include=dev && npm run build && cd ../backend && npm ci
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
